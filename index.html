<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Franse Draaikaartjes</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        h1 {
            margin-top: 20px;
            font-size: 2.5rem;
        }

        #game {
            margin: 20px;
        }

        #cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            perspective: 1000px;
        }

        .inner {
            position: relative;
            width: 100%;
            height: 160px;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flip .inner {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .front {
            background: linear-gradient(135deg, #43cea2, #185a9d);
            flex-direction: column;
        }

        .back {
            transform: rotateY(180deg);
            flex-direction: column;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
        }

        button, input {
            margin-top: 10px;
            padding: 8px;
            border-radius: 8px;
            border: none;
        }

        #score {
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .correct { background: #4CAF50 !important; }
        .wrong { background: #e74c3c !important; }

        .controls { margin-top: 10px; }
    </style>
</head>
<body>

<h1>🇫🇷 Franse Draaikaartjes</h1>
<p>Raad eerst het Franse woord en klik dan op controleren!</p>

<div id="game">
    <div>Score: <span id="score">0</span> / 5</div>
    <div class="controls">
        <button id="resetBtn">Reset score</button>
    </div>
</div>

<div id="cards"></div>

<script>
const woorden = [
    { nl: "huis", fr: "maison" },
    { nl: "boek", fr: "livre" },
    { nl: "water", fr: "eau" },
    { nl: "eten", fr: "manger" },
    { nl: "school", fr: "école" }
];

// --- Persistente score met localStorage ---
const STORAGE_KEY = 'fr_flashcards_score_v1';

function loadScore() {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? parseInt(saved, 10) : 0;
}

function saveScore(value) {
    localStorage.setItem(STORAGE_KEY, String(value));
}

let score = loadScore();

const container = document.getElementById("cards");
const scoreEl = document.getElementById("score");
const resetBtn = document.getElementById('resetBtn');

scoreEl.textContent = score;

resetBtn.onclick = () => {
    score = 0;
    saveScore(score);
    scoreEl.textContent = score;
    // visuele reset (optioneel)
    document.querySelectorAll('.card').forEach(c => {
        c.classList.remove('correct','wrong','flip');
        const input = c.querySelector('input');
        if (input) input.value = '';
        c.dataset.answered = 'false';
    });
};

woorden.forEach((w, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.answered = 'false'; // voorkom dubbel tellen

    const inner = document.createElement("div");
    inner.className = "inner";

    const front = document.createElement("div");
    front.className = "front";
    front.textContent = w.nl;

    const back = document.createElement("div");
    back.className = "back";

    const frWord = document.createElement("div");
    frWord.textContent = w.fr;

    const input = document.createElement("input");
    input.placeholder = "Typ Frans woord";

    const checkBtn = document.createElement("button");
    checkBtn.textContent = "Check";

    checkBtn.onclick = (e) => {
        e.stopPropagation();

        // al beantwoord? dan niets meer doen
        if (card.dataset.answered === 'true') {
            card.classList.add('flip');
            return;
        }

        if (input.value.toLowerCase().trim() === w.fr) {
            card.classList.add("correct");
            score++;
            saveScore(score);
            scoreEl.textContent = score;
        } else {
            card.classList.add("wrong");
        }

        card.dataset.answered = 'true';
        card.classList.add("flip");
    };

    const speakBtn = document.createElement("button");
    speakBtn.textContent = "🔊";
    speakBtn.onclick = (e) => {
        e.stopPropagation();
        const u = new SpeechSynthesisUtterance(w.fr);
        u.lang = "fr-FR";
        speechSynthesis.speak(u);
    };

    back.appendChild(frWord);
    back.appendChild(speakBtn);

    front.appendChild(document.createElement("br"));
    front.appendChild(input);
    front.appendChild(checkBtn);

    inner.appendChild(front);
    inner.appendChild(back);
    card.appendChild(inner);
    container.appendChild(card);
});
</script>

</body>
</html>
